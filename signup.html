  :root {
    --copper: #c45236;
    --brown: #765020;
    --judge-gray: #50482e;
    --laser-lemon: #ffff5f;
    --orange: #ff8432;
    --thistle-green: #c5c6a4;
    --sky-blue: #62b4ff;
    --cream: #faf6ea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Gal Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--copper);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 48px;
    position: relative;
    overflow-x: hidden;
  }

  /* Decorative ray burst, echoes the brand pattern */
  .rays {
    position: fixed;
    top: -20%;
    right: -30%;
    width: 90vw;
    height: 90vw;
    max-width: 700px;
    max-height: 700px;
    opacity: 0.16;
    pointer-events: none;
    z-index: 0;
  }
  .rays-bottom {
    position: fixed;
    bottom: -25%;
    left: -25%;
    width: 70vw;
    height: 70vw;
    max-width: 550px;
    max-height: 550px;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    transform: rotate(200deg);
  }

  .logo {
    height: 20px;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--brown);
    border-radius: 24px;
    padding: 40px 30px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--laser-lemon);
    text-align: center;
    margin: 0 0 10px;
    font-weight: 400;
  }

  h1 {
    font-family: 'Rhymes Display', Georgia, serif;
    font-weight: 300;
    font-size: 32px;
    line-height: 1.15;
    margin: 0 0 4px;
    text-align: center;
    color: var(--cream);
  }
  h1 em {
    font-style: italic;
    color: var(--orange);
  }

  p.subtitle {
    text-align: center;
    color: var(--thistle-green);
    font-size: 14px;
    margin: 10px 0 26px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 400;
    color: var(--thistle-green);
    margin-bottom: 6px;
    margin-top: 18px;
  }
  input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid rgba(250,246,234,0.18);
    background: rgba(0,0,0,0.18);
    color: var(--cream);
    font-family: 'Gal Gothic', sans-serif;
    font-size: 15px;
    outline: none;
  }
  input::placeholder { color: rgba(250,246,234,0.35); }
  input:focus { border-color: var(--orange); }

  button#submitBtn {
    width: 100%;
    margin-top: 28px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: var(--laser-lemon);
    color: var(--judge-gray);
    font-family: 'Gal Gothic', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.01em;
    cursor: pointer;
  }
  button#submitBtn:disabled { opacity: 0.6; cursor: not-allowed; }
  button#submitBtn:hover:not(:disabled) { background: #fff37a; }

  .error {
    color: #ffd7c9;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .result { display: none; text-align: center; }
  .result.show { display: block; }
  .form.hide { display: none; }

  #qrcode {
    margin: 22px auto 12px;
    background: var(--cream);
    padding: 18px;
    border-radius: 16px;
    display: inline-block;
  }
  .result h2 {
    font-family: 'Rhymes Display', Georgia, serif;
    font-weight: 300;
    font-size: 22px;
    margin-bottom: 2px;
    color: var(--cream);
  }
  .result p.meta { color: var(--thistle-green); font-size: 14px; margin: 4px 0 0; }

  .instructions {
    margin-top: 18px;
    font-size: 13px;
    color: var(--judge-gray);
    background: var(--thistle-green);
    border-radius: 10px;
    padding: 12px 14px;
    line-height: 1.5;
  }

  .again {
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    border: 1px solid rgba(250,246,234,0.25);
    border-radius: 10px;
    background: transparent;
    color: var(--cream);
    font-family: 'Gal Gothic', sans-serif;
    font-size: 15px;
    cursor: pointer;
  }
  .again:hover { background: rgba(255,255,255,0.06); }

  footer {
    margin-top: 26px;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(250,246,234,0.45);
    text-align: center;
    position: relative;
    z-index: 1;
  }
</style>
</head>

  <div class="card">
    <div class="form" id="formWrap">
      <p class="eyebrow">Multiply or Die</p>
      <h1>Redeem Your <em>Book</em></h1>
      <p class="subtitle">Enter your details below to get your QR code — show it at the table to collect your copy.</p>

      <label for="firstName">First name</label>
      <input id="firstName" type="text" autocomplete="given-name" placeholder="Jordan" />

      <label for="lastName">Last name</label>
      <input id="lastName" type="text" autocomplete="family-name" placeholder="Smith" />

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="jordan@example.com" />

      <div class="error" id="errorMsg"></div>

      <button id="submitBtn">Get My QR Code</button>
    </div>

    <div class="result" id="resultWrap">
      <p class="eyebrow">Multiply or Die</p>
      <h2 id="resultName"></h2>
      <p class="meta" id="resultEmail"></p>
      <div id="qrcode"></div>
      <p class="meta" id="resultTime"></p>
      <div class="instructions">Show this QR code at the table to redeem your copy of Multiply or Die. It can only be scanned once.</div>
      <button class="again" id="againBtn">Register someone else</button>
    </div>
  </div>

  <footer>Futures Church</footer>

<script>
  const SUPABASE_URL = "https://xaqtwehdbhydebysrest.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_j_7ub6CbSmiLdQdRiFfbpQ_9hQYru_X";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const firstName = document.getElementById('firstName');
  const lastName = document.getElementById('lastName');
  const email = document.getElementById('email');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const formWrap = document.getElementById('formWrap');
  const resultWrap = document.getElementById('resultWrap');
  const againBtn = document.getElementById('againBtn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }
  function clearError() {
    errorMsg.style.display = 'none';
  }
  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  submitBtn.addEventListener('click', async () => {
    clearError();
    const fn = firstName.value.trim();
    const ln = lastName.value.trim();
    const em = email.value.trim();

    if (!fn || !ln || !em) {
      showError('Please fill in first name, last name, and email.');
      return;
    }
    if (!isValidEmail(em)) {
      showError('Please enter a valid email address.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Generating...';

    const { data, error } = await supabaseClient
      .from('redemptions')
      .insert({ first_name: fn, last_name: ln, email: em })
      .select('id, first_name, last_name, email, created_at')
      .single();

    submitBtn.disabled = false;
    submitBtn.textContent = 'Get My QR Code';

    if (error) {
      console.error(error);
      showError('Something went wrong saving your details. Please try again.');
      return;
    }

    document.getElementById('qrcode').innerHTML = '';
    await QRCode.toCanvas(
      (() => {
        const c = document.createElement('canvas');
        document.getElementById('qrcode').appendChild(c);
        return c;
      })(),
      data.id,
      { width: 220, margin: 1, color: { dark: '#50482e', light: '#faf6ea' } }
    );

    document.getElementById('resultName').textContent = `${data.first_name} ${data.last_name}`;
    document.getElementById('resultEmail').textContent = data.email;
    document.getElementById('resultTime').textContent = new Date(data.created_at).toLocaleString();

    formWrap.classList.add('hide');
    resultWrap.classList.add('show');
  });

  againBtn.addEventListener('click', () => {
    firstName.value = '';
    lastName.value = '';
    email.value = '';
    formWrap.classList.remove('hide');
    resultWrap.classList.remove('show');
  });
</script>
</body>
